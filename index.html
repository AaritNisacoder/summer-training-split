      "Optional: NormaTec compression on legs, or CryoLounge+ if knees feel unusually sore or achy (see note below)"
    ],
    recoveryNote: "Leg day is where the recovery center trade-off is genuinely more complicated. NormaTec compression has solid research support for reducing leg soreness and is a good default choice here, no real downside for your goals. Cold therapy (CryoLounge+) is more of a judgment call: the same research showing it blunts hypertrophy applies to legs too, so skip it as a routine habit if quad and hamstring growth matters to you. But if your knees are unusually sore, achy, or inflamed after jump-heavy sessions specifically, cold therapy does have real support for reducing joint-level inflammation and soreness, so using it occasionally for knee comfort (not as a weekly ritual) is a reasonable trade-off. When in doubt, default to NormaTec or just the stretches above."
  },
  {
    key: "sun",
    tabLabel: "Sun",
    fullLabel: "Rest",
    isRest: true
  }
];

const state = {
  activeDay: days[0].key,
  checked: {}
};

function exerciseKey(dayKey, sectionIdx, itemIdx) {
  return dayKey + "|" + sectionIdx + "|" + itemIdx;
}

function checkIconSvg() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="#0f1115" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
}

function videoIconSvg() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>';
}

function toggleExercise(key) {
  if (state.checked[key]) {
    delete state.checked[key];
  } else {
    state.checked[key] = true;
  }
  renderMain();
}

function setActiveDay(key) {
  state.activeDay = key;
  renderTabs();
  renderMain();
}

function resetToday() {
  const day = days.find(d => d.key === state.activeDay);
  if (!day || !day.sections) return;
  day.sections.forEach((section, sIdx) => {
    if (section.type === "exercises") {
      section.items.forEach((item, iIdx) => {
        delete state.checked[exerciseKey(day.key, sIdx, iIdx)];
      });
    }
  });
  renderMain();
}

function renderTabs() {
  const tabsEl = document.getElementById("dayTabs");
  tabsEl.innerHTML = "";
  days.forEach(day => {
    const btn = document.createElement("button");
    btn.className = "day-tab" + (day.key === state.activeDay ? " active" : "");
    btn.textContent = day.tabLabel;
    btn.onclick = () => setActiveDay(day.key);
    tabsEl.appendChild(btn);
  });
}

function renderMain() {
  const main = document.getElementById("main");
  const footer = document.getElementById("footerNote");
  const day = days.find(d => d.key === state.activeDay);

  if (day.isRest) {
    main.innerHTML =
      '<div class="day-banner">' +
        '<div class="rest-day">' +
          '<h2>Rest day</h2>' +
          '<p>No lifting today. Light stretching or walking is fine if you want to move, but full recovery is what makes the rest of the week work.</p>' +
        '</div>' +
      '</div>';
    footer.innerHTML = "";
    return;
  }

  let totalExercises = 0;
  let doneExercises = 0;
  day.sections.forEach((section, sIdx) => {
    if (section.type === "exercises") {
      section.items.forEach((item, iIdx) => {
        totalExercises++;
        if (state.checked[exerciseKey(day.key, sIdx, iIdx)]) doneExercises++;
      });
    }
  });
  const pct = totalExercises ? Math.round((doneExercises / totalExercises) * 100) : 0;

  let html = '';
  html += '<div class="day-banner">';
  html += '<h2>' + day.fullLabel + '</h2>';
  if (day.duration) {
    html += '<p style="margin-bottom:4px; font-weight:600; color:var(--accent);">Estimated time: ' + day.duration + ' (including warm-up and cooldown)</p>';
  }
  html += '<p>' + day.subtitle + '</p>';
  html += '<div class="progress-bar-track"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>';
  html += '</div>';

  day.sections.forEach((section, sIdx) => {
    html += '<div class="section">';
    let badgeHtml = '';
    if (section.badge) {
      const cls = section.badge === 'new' ? 'badge new' : 'badge';
      badgeHtml = '<span class="' + cls + '">' + section.badge + '</span>';
    }
    html += '<div class="section-title">' + section.title + badgeHtml + '</div>';

    if (section.type === "list") {
      html += '<div class="exercise"><ul class="warmup-list">';
      section.items.forEach(item => {
        html += '<li>' + item + '</li>';
      });
      html += '</ul></div>';
    } else {
      section.items.forEach((item, iIdx) => {
        const key = exerciseKey(day.key, sIdx, iIdx);
        const done = !!state.checked[key];
        html += '<div class="exercise ' + (done ? "done" : "") + '">';
        html += '<div class="exercise-row">';
        html += '<div class="checkbox ' + (done ? "checked" : "") + '" data-key="' + key + '">' + checkIconSvg() + '</div>';
        html += '<div class="exercise-body">';
        html += '<div class="exercise-name-row">';
        html += '<span class="exercise-name">' + item.name + '</span>';
        html += '<span class="exercise-sets">' + item.sets + '</span>';
        html += '</div>';
        html += '<div class="exercise-meta">';
        if (item.muscles) html += '<span class="tag muscle">' + item.muscles + '</span>';
        if (item.rest) html += '<span class="tag rest">Rest: ' + item.rest + '</span>';
        html += '</div>';
        if (item.note) {
          html += '<div class="exercise-note">' + item.note + '</div>';
        }
        html += '<div class="exercise-actions">';
        html += '<a class="video-link" href="' + ytSearch(item.video) + '" target="_blank" rel="noopener">' + videoIconSvg() + ' Watch form</a>';
        html += '</div>';
        html += '</div>';
        html += '</div>';
        html += '</div>';
      });
    }
    html += '</div>';
  });

  if (day.cooldown && day.cooldown.length) {
    html += '<div class="section">';
    html += '<div class="section-title">Cooldown<span class="badge new">do last</span></div>';
    html += '<div class="exercise"><ul class="warmup-list">';
    day.cooldown.forEach(item => {
      html += '<li>' + item + '</li>';
    });
    html += '</ul></div>';
    html += '<div class="exercise-note" style="margin-top:-4px;">Worth knowing: rigorous research on post-workout stretching for reducing next-day soreness is actually mixed, a solid meta-analysis found no real difference vs. just resting. This cooldown still helps with blood flow, flexibility, and easing your body out of training mode, just don\'t expect it to erase soreness entirely. Some soreness after a new or updated routine is a completely normal training response.</div>';
    if (day.recoveryNote) {
      html += '<div class="exercise-note" style="margin-top:8px;">' + day.recoveryNote + '</div>';
    }
    html += '</div>';
  }

  main.innerHTML = html;

  main.querySelectorAll(".checkbox").forEach(box => {
    box.addEventListener("click", () => toggleExercise(box.getAttribute("data-key")));
  });

  footer.innerHTML =
    '<p><strong style="color:var(--text-secondary)">Daily push-up practice, every day, not just push days:</strong> 3-4 sets at roughly 50-60% of your current max, well short of failure, spread through the day if you can. Retest your max weekly.</p>' +
    '<p><strong style="color:var(--text-secondary)">Pull-up progression:</strong> retest your max every 2-3 weeks after a rest day and adjust your working sets from there.</p>' +
    '<p><strong style="color:var(--text-secondary)">Knee pain warning:</strong> sharp pain below the kneecap that doesn\'t resolve in a couple of days means stop jumping and squatting, and see a doctor.</p>' +
    '<button class="reset-btn" id="resetBtn">Reset today\'s checkmarks</button>';

  document.getElementById("resetBtn").addEventListener("click", resetToday);
}

renderTabs();
renderMain();
</script>

</body>
</html>
